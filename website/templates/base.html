<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-Signal AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #2563eb; --bg-light: #f8fafc; }
        body { background-color: var(--bg-light); color: #1e293b; font-family: 'Inter', sans-serif; }
        .navbar { background-color: white !important; border-bottom: 1px solid #e2e8f0; }
        .navbar-brand { font-weight: 700; color: var(--primary-blue) !important; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .form-control { border: 1px solid #cbd5e1; padding: 10px; }
        .btn-primary { background-color: var(--primary-blue); border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">ALPHA-SIGNAL AI</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-dark fw-medium" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link text-dark fw-medium mx-2" href="{{ url_for('settings') }}">Settings</a>
                <a class="nav-link btn btn-primary text-white px-3" href="{{ url_for('billing') }}">Upgrade</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
