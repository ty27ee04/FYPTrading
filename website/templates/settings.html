{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card shadow-lg border-0">
                <div class="card-header border-0 bg-transparent pt-4 px-4">
                    <h4 class="fw-bold m-0 text-white">Risk Profile Configuration</h4>
                    <p class="text-muted small mb-0">Tune Conformal Filtering boundaries and safety boundaries</p>
                </div>
                <div class="card-body p-4">
                    <form>
                        <div class="mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <label class="form-label small fw-medium text-muted m-0">Maximum Drawdown System Limit</label>
                                <!-- Interactive Reactive Slider Counter Badge Output Variable Added -->
                                <span class="badge bg-primary font-monospace" id="drawdownValueDisplay">10.0%</span>
                            </div>
                            <input type="range" class="form-range" min="1" max="25" step="0.5" id="drawdownRangeInput" value="10.0"
                                   oninput="document.getElementById('drawdownValueDisplay').innerText = parseFloat(this.value).toFixed(1) + '%'">
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted mb-1">Stop-Loss (SL) Auto-Fit Threshold Bounds (Pips)</label>
                            <input type="number" class="form-control font-monospace" value="25" min="5" max="100">
                        </div>

                        <div class="mb-4">
                            <label class="form-label small text-muted mb-1">Conformal Prediction Uncertainty Filter (&alpha;)</label>
                            <input type="number" class="form-control font-monospace" value="0.10" step="0.01" min="0.01" max="0.50">
                            <div class="form-text text-muted small mt-1">Signals falling below the calculation interval thresholds skip automated execution routines automatically.</div>
                        </div>

                        <button type="button" class="btn btn-primary w-100 fw-semibold py-2 mt-2" onclick="alert('Configuration variables flushed securely to local profile cache successfully.')">Save Risk Parameter Stack</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
